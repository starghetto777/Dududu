<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DropForge — Открытие кейсов CS2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-glow"></div>
    <header class="topbar">
      <div class="logo-wrap">
        <span class="logo-mark">⚡</span>
        <div>
          <p class="logo-title">DropForge</p>
          <p class="logo-sub">case opening • cs2</p>
        </div>
      </div>
      <div class="top-controls">
        <button id="add-balance" class="ghost-btn">+ 500₽</button>
        <div class="balance-pill">Баланс: <span id="balance">1200</span> ₽</div>
      </div>
    </header>

    <main class="layout">
      <section>
        <div class="section-head">
          <h1>Кейсы</h1>
          <p>Выбери кейс и нажми «Открыть»</p>
        </div>
        <div id="case-grid" class="case-grid"></div>
      </section>

      <section>
        <div class="section-head">
          <h2>Открытие кейса</h2>
          <p>Шанс дропа зависит от редкости</p>
        </div>
        <article class="open-panel">
          <div class="open-meta">
            <div>
              <p class="meta-label">Текущий кейс</p>
              <p id="selected-case" class="meta-value">—</p>
            </div>
            <div>
              <p class="meta-label">Стоимость</p>
              <p id="selected-price" class="meta-value">—</p>
            </div>
            <button id="open-btn" class="primary-btn" disabled>Открыть кейс</button>
          </div>

          <div class="roulette-wrap">
            <div class="pointer"></div>
            <div id="roulette-track" class="roulette-track"></div>
          </div>

          <div id="drop-result" class="drop-result muted">Выбери кейс для открытия.</div>
        </article>
      </section>

      <section>
        <div class="section-head">
          <h2>Твой инвентарь</h2>
          <p>Предметы, которые ты выбил</p>
        </div>
        <div id="inventory" class="inventory empty">
          Пока пусто. Открой первый кейс.
        </div>
      </section>
    </main>

    <template id="case-card-template">
      <button class="case-card">
        <p class="case-name"></p>
        <p class="case-price"></p>
        <div class="case-items"></div>
      </button>
    </template>

    <template id="inventory-item-template">
      <article class="inv-item">
        <p class="inv-name"></p>
        <p class="inv-rarity"></p>
        <p class="inv-price"></p>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
